# Zenn記事からQiita用記事を生成して投稿するワークフロー
#
# 必要なSecrets:
#   - QIITA_TOKEN: Qiitaのアクセストークン（read_qiita, write_qiita スコープ）
#
name: Publish to Qiita

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'articles/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  convert_and_publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Pull latest from Qiita
        run: npx qiita pull
        env:
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}

      - name: Commit Qiita pull changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/
          git diff --staged --quiet || git commit -m "Sync from Qiita [skip ci]"
          git push || true

      - name: Convert Zenn articles to Qiita format
        run: npm run qiita:convert:all

      - name: Publish to Qiita
        uses: increments/qiita-cli/actions/publish@v1
        with:
          qiita-token: ${{ secrets.QIITA_TOKEN }}
          root: "."
